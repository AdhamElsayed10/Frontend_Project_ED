<style>
#erd { padding: 0.5rem 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2C2C2A' : '#F1EFE8',
    primaryBorderColor: dark ? '#5F5E5A' : '#B4B2A9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    noteBkgColor: dark ? '#1e1e1c' : '#fafaf8',
    attributeBackgroundColorOdd: dark ? '#23231f' : '#fafaf8',
    attributeBackgroundColorEven: dark ? '#1a1a17' : '#f1efe8',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
    USERS {
     string id PK "FL-YEAR-XXXX"
     string name
     string email UK
     string phone
     string nationalId
     string job
     string password
     string plan "free|premium|elite"
     int scans
     float saved
     timestamp join_date
     int points
   }
  COMPANIES {
    string id PK "CO-timestamp"
    string name
    string email UK
    string password
    string cat "gym|food|medical|fun"
    string city
    string emoji
    string status "pending|approved|rejected"
    timestamp join_date
    int views
    int uses
    float commission
  }
  DISCOUNTS {
    int id PK
    string name
    string cat "gym|food|medical|fun"
    string pct
    string desc
    string city
    string tier "free|premium|elite"
    string co_id FK
    int uses
    int views
    string status "pending|approved|rejected"
    timestamp created_at
    string company_name
  }
  CARDS {
    string user_id FK
    string card_holder_name
    string card_number
    string expiry
  }
  INSTALLMENTS {
    string id PK
    string user_id FK
    string name
    float total
    float paid
    float monthly_amt
    timestamp next_due
  }
  ADMIN {
    string email PK
    string password
  }

  USERS ||--o{ DISCOUNTS : "uses (scans)"
  COMPANIES ||--o{ DISCOUNTS : "submits"
  USERS ||--o| CARDS : "has"
  USERS ||--o{ INSTALLMENTS : "has"
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
